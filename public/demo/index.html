<!doctype html>

<style>
  :root {
    color-scheme: light;
    --ink: #0a0a0a;
    --paper: #ffffff;
    --muted: #6a6a6a;
    --line: #ececec;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font: 400 17px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
  }
  header, footer { flex: 0 0 auto; }
  main {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  .kicker {
    font: 600 11px/1 -apple-system, system-ui, sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0;
  }

  h1 {
    font: 800 56px/0.98 -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    letter-spacing: -0.035em;
    margin: 0;
  }
  h1 .strike {
    position: relative;
    color: var(--muted);
  }
  h1 .strike::after {
    content: "";
    position: absolute;
    left: -2%;
    right: -2%;
    top: 52%;
    height: 5px;
    background: var(--ink);
    border-radius: 3px;
  }

  .lede {
    font-size: 19px;
    line-height: 1.4;
    color: var(--ink);
    margin: 0;
    max-width: 28ch;
  }

  /* The visual card. The <a rel="ar"> inside contains ONLY the <img>
     (Apple/WebKit requirement). Labels are siblings of the <a>. */
  .ar-card {
    display: block;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 20px 22px;
    background: var(--paper);
    text-align: center;
    transition: transform 0.12s ease;
  }
  .ar-card:has(.ar-link:active) { transform: scale(0.985); }

  .ar-link {
    display: block;
    text-decoration: none;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
    margin: 0 0 18px;
  }
  .ar-link img {
    display: block;
    width: 110px;
    height: 220px;
    margin: 0 auto;
    object-fit: contain;
  }
  .ar-label {
    font: 700 15px/1 -apple-system, system-ui, sans-serif;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .ar-sub {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .hint {
    font-size: 15px;
    color: var(--muted);
    margin: 0;
    max-width: 32ch;
  }
  .hint b { color: var(--ink); font-weight: 600; }

  footer {
    margin-top: 32px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--muted);
    max-width: 480px;
    width: 100%;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  /* Non-iOS fallback */
  .non-ios { display: none; }
  @supports not (-webkit-touch-callout: none) {
    /* desktop / android — still allow the link, but warn */
  }
</style>
</head>
<body>

<header>
  <p class="kicker">PowerPoint Night · 2026</p>
</header>

<main>
  <h1>i'm not <span class="strike">short</span>.</h1>

  <p class="lede">This stick figure is the height of the average human on Earth. I am taller than this stick figure.</p>

  <div class="ar-card">
    <a class="ar-link" rel="ar" href="/figure.usdz#allowsContentScaling=0"><img src="/stick-thumb.svg" width="120" height="240" alt="Stick figure, 165 cm tall"></a>
    <div class="ar-label">Launch in AR</div>
    <div class="ar-sub">tap the figure to drop it</div>
  </div>

  <p class="hint">Point your camera at the floor <b>next to me</b>, tap to place, then stand beside it.</p>
</main>

<footer>
  <span>5&prime;5&Prime; · 165 cm</span>
  <span>global average human</span>
</footer>

</body>
</html>
