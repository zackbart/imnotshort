<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="color-scheme" content="dark only">
<title>control · i'm not short</title>
<style>
  :root {
    --bg: #0d0d0d;
    --ink: #fef9ec;
    --muted: #888;
    --hot: #ff3d2e;
    --lime: #c8ff3d;
    --line: #222;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    overscroll-behavior: contain;
    -webkit-text-size-adjust: 100%;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 10;
    padding: 0.75rem 1rem;
    padding-top: calc(0.75rem + env(safe-area-inset-top));
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem;
  }
  .count {
    font-family: 'Archivo Black', system-ui, sans-serif;
    font-size: 1.6rem; letter-spacing: 0.02em;
  }
  .count .total { color: var(--muted); font-weight: 400; }
  .status {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .status[data-state="connected"] .dot { background: var(--lime); }
  .status[data-state="reconnecting"] .dot { background: #ffa500; animation: pulse 1s ease-in-out infinite; }
  .status[data-state="offline"] .dot { background: var(--hot); }
  @keyframes pulse { 50% { opacity: 0.35; } }

  /* Notes body */
  main {
    flex: 1;
    padding: 1.25rem 1.25rem 1rem;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    /* Leave room for the sticky button bar */
    padding-bottom: calc(7rem + env(safe-area-inset-bottom));
  }
  main h3 {
    font-family: 'Archivo Black', system-ui, sans-serif;
    font-size: 1.1rem; letter-spacing: 0.04em;
    color: var(--hot);
    text-transform: uppercase;
    margin: 1.4rem 0 0.6rem;
  }
  main h3:first-child { margin-top: 0; }
  main p { font-size: 1.35rem; line-height: 1.4; margin: 0 0 1rem; color: #d8d3ca; }
  main ul, main ol { padding-left: 1.3rem; margin: 0.5rem 0 1rem; }
  main li { font-size: 1.35rem; margin-bottom: 0.65rem; color: #c8c3ba; line-height: 1.4; }
  main em { color: var(--ink); font-style: italic; }
  main strong { color: var(--ink); }
  main a { color: #ff7a6e; text-decoration: underline; word-break: break-all; }
  main code {
    font-family: 'DM Mono', ui-monospace, monospace;
    background: #1a1a1a;
    padding: 0.1em 0.35em;
    border-radius: 3px;
    font-size: 0.9em;
  }

  /* Sticky bottom controls */
  .controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    padding: 0.5rem;
    padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 60%, rgba(13,13,13,0));
    z-index: 20;
  }
  .controls button {
    appearance: none; border: 0; cursor: pointer;
    font-family: 'Archivo Black', system-ui, sans-serif;
    font-size: 1.25rem; letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 1.1rem 1rem;
    min-height: 64px;
    border-radius: 12px;
    color: var(--ink);
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    transition: transform 0.08s, background 0.15s;
    touch-action: manipulation;
  }
  .controls button:active:not(:disabled) {
    transform: scale(0.97);
    background: #252525;
  }
  .controls button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .controls .next {
    background: var(--hot);
    border-color: var(--hot);
    color: #fff;
  }
  .controls .next:active:not(:disabled) { background: #d92e21; }

  /* No-notes placeholder */
  .empty {
    color: var(--muted); font-style: italic; text-align: center;
    margin-top: 3rem;
  }

  @media (min-width: 768px) {
    body { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Archivo+Black&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="count"><span id="cur">1</span><span class="total"> / 10</span></div>
  <div class="status" id="status" data-state="connecting">
    <span class="dot"></span><span id="status-label">connecting</span>
  </div>
</header>

<main id="notes">
  <div class="empty">loading…</div>
</main>

<div class="controls">
  <button id="prev">‹ Prev</button>
  <button id="next" class="next">Next ›</button>
</div>

<script>
const TOTAL = 10;

const NOTES = {
  1: `<h3>Opening</h3>
      <ul>
        <li>Reclaim "mid" — it was always the goal</li>
        <li>Not defending → prosecuting everyone else's insecurity</li>
      </ul>
      <p><em>Commit. Conviction sells the bit.</em></p>`,

  2: `<h3>The argument</h3>
      <ul>
        <li>Online "mid" = nothing special</li>
        <li>Statistical "mid" = the median, the default, peak normal</li>
      </ul>
      <p><em>Thank them — they called you the platonic ideal.</em></p>`,

  3: `<h3>Global mid</h3>
      <ul>
        <li><strong>171 cm = 5'7.5"</strong> — global mean adult male</li>
        <li>OWID + NCD-RisC: 65M people, 200 countries</li>
        <li>US avg <strong>5'9"</strong> → why it <em>feels</em> short here</li>
        <li>Online everyone <em>claims</em> 6'0"</li>
      </ul>`,

  4: `<h3>Witnesses</h3>
      <ul>
        <li>Read each "MID" stamp like a verdict</li>
        <li>Mid ≠ ceiling on what you can do</li>
      </ul>
      <h3>Napoleon</h3>
      <ul>
        <li>Actually <strong>~5'7"</strong> — average Frenchman of his era</li>
        <li>Myth = bad unit conversion + Gillray's "Little Boney" cartoons</li>
        <li>200 years of literal height propaganda</li>
      </ul>`,

  5: `<h3>Heightflation</h3>
      <ul>
        <li><strong>Real:</strong> 14.5% of US men ≥ 6'0" (NHANES)</li>
        <li><strong>Claimed:</strong> 33% — <em>more than 2×</em></li>
        <li>Dating apps: OkCupid +2", Coffee Meets Bagel +0.5"</li>
      </ul>
      <p><em>Coin it. When everyone's 6'0", nobody is.</em></p>`,

  6: `<h3>Live demo</h3>
      <ul>
        <li>Scan QR → <code>imnotshort.zackbart.com/demo</code></li>
        <li>Drop 1.65m / <strong>5'5"</strong> figure on the floor</li>
        <li>Stand next to it. Pause. Let it land.</li>
      </ul>
      <p><em>Backup if AR fails:</em> "global avg is 5'5" — half the planet is shorter than this stick figure." Move on.</p>`,

  7: `<h3>Plot twist: mid is optimal</h3>
      <ul>
        <li><strong>Kuakini</strong> (PLOS 2014, 8,003 men, 40 yrs): shorter men outlived taller</li>
        <li><strong>Italian military:</strong> &lt;5'4" lived ~2 yrs longer at age 70</li>
        <li><strong>NBA:</strong> tallest died youngest</li>
        <li>Mechanism: more cells → more chances for cancer</li>
      </ul>
      <p><em>Punchline: calling someone mid = announcing you'll die first.</em></p>`,

  8: `<h3>Cross-exam</h3>
      <ul>
        <li>Napoleon Complex = named after a man who wasn't short</li>
        <li>UCLan 2007: short men <em>less</em> likely to lose their temper</li>
        <li>"Taller men earn more" — real but confounded, punt to Q&amp;A</li>
      </ul>`,

  9: `<h3>Verdict</h3>
      <p><em>Slow. Lower voice. Hold.</em></p>
      <ul>
        <li>"Perfectly mid."</li>
        <li>Messi. Kendrick. Pacino. Napoleon.</li>
        <li>"The defense rests."</li>
      </ul>
      <p><em>Optional: drop the clicker.</em></p>`,

  10: `<h3>Q&amp;A</h3>
       <ul>
         <li>Studies if asked: PLOS ONE 2014, NCD-RisC / OWID, CDC NHANES, Wikipedia "Napoleon complex"</li>
         <li>Heckler about your height: "thank you for proving my point" → sit down</li>
       </ul>`
};

let current = 1;
let inFlight = false;
let es = null;
// Monotonic timestamp of the most recent state we've rendered. Used to
// reject stale /api/state responses that arrive after a fresher SSE message.
let lastUpdateAt = 0;

const elCur = document.getElementById('cur');
const elNotes = document.getElementById('notes');
const elPrev = document.getElementById('prev');
const elNext = document.getElementById('next');
const elStatus = document.getElementById('status');
const elStatusLabel = document.getElementById('status-label');

function render(n) {
  lastUpdateAt = performance.now();
  current = n;
  elCur.textContent = String(n);
  elNotes.innerHTML = NOTES[n] || '<div class="empty">no notes for this slide</div>';
  elNotes.scrollTop = 0;
  elPrev.disabled = inFlight || n <= 1;
  elNext.disabled = inFlight || n >= TOTAL;
}

function setStatus(state, label) {
  elStatus.dataset.state = state;
  elStatusLabel.textContent = label;
}

async function pushDelta(d) {
  if (inFlight) return;
  inFlight = true;
  elPrev.disabled = true;
  elNext.disabled = true;
  // Re-enable after a max timeout in case the response never comes.
  const failsafe = setTimeout(() => {
    inFlight = false;
    elPrev.disabled = current <= 1;
    elNext.disabled = current >= TOTAL;
  }, 1500);
  try {
    const res = await fetch('/api/slide', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ delta: d }),
    });
    if (!res.ok) throw new Error('http ' + res.status);
    const data = await res.json();
    render(data.slide);
  } catch (err) {
    setStatus('offline', 'send failed');
    setTimeout(() => { if (es && es.readyState === EventSource.OPEN) setStatus('connected', 'live'); }, 1200);
  } finally {
    clearTimeout(failsafe);
    inFlight = false;
    elPrev.disabled = current <= 1;
    elNext.disabled = current >= TOTAL;
  }
}

elPrev.addEventListener('click', () => pushDelta(-1));
elNext.addEventListener('click', () => pushDelta(1));

function openStream() {
  if (es) { try { es.close(); } catch {} }
  setStatus('reconnecting', 'connecting');
  es = new EventSource('/events');
  es.addEventListener('open', () => setStatus('connected', 'live'));
  es.addEventListener('message', (ev) => {
    try {
      const data = JSON.parse(ev.data);
      if (typeof data.slide === 'number') render(data.slide);
    } catch {}
  });
  es.addEventListener('error', () => {
    setStatus('reconnecting', 'reconnecting');
    // EventSource auto-reconnects; this listener fires on transient errors too.
  });
}

async function hydrate() {
  const startedAt = performance.now();
  try {
    const r = await fetch('/api/state');
    if (!r.ok) return;
    const d = await r.json();
    // Drop the hydrate result if a newer SSE message rendered after we
    // started the request — avoids stale /api/state overwriting fresher state.
    if (lastUpdateAt > startedAt) return;
    if (typeof d.slide === 'number') render(d.slide);
  } catch {}
}

// iOS Safari aggressively suspends backgrounded tabs and may not deliver
// EventSource messages promptly on return. Force a fresh state + stream on
// visibility return.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    hydrate();
    if (!es || es.readyState !== EventSource.OPEN) openStream();
  }
});

hydrate();
openStream();
</script>

</body>
</html>
